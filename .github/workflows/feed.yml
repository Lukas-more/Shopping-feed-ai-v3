name: Generate Feed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    # Two UTC schedules cover both CET and CEST; a Prague-time gate below allows only 05:30 local time.
    - cron: "30 3 * * *"
    - cron: "30 4 * * *"

jobs:
  build-feed:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Prague runtime window
        id: prague_time
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_time=$(TZ=Europe/Prague date +%H:%M)
          echo "Current Europe/Prague time: $current_time"

          if [ "$current_time" = "05:30" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled run outside 05:30 Europe/Prague."
          fi

      - name: Set up Python
        if: steps.prague_time.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore AI cache
        if: steps.prague_time.outputs.should_run == 'true'
        id: ai_cache_restore
        uses: actions/cache/restore@v4
        with:
          path: data/cache.json
          key: shopping-feed-ai-cache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            shopping-feed-ai-cache-${{ github.ref_name }}-

      - name: Install dependencies
        if: steps.prague_time.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare runtime settings
        if: steps.prague_time.outputs.should_run == 'true'
        env:
          FEED_URL: ${{ secrets.FEED_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          feed_url = os.environ.get("FEED_URL", "").strip()
          if not feed_url:
              raise SystemExit("Missing GitHub secret FEED_URL.")

          source = Path("config/settings.example.json")
          target = Path("config/settings.runtime.json")
          settings = json.loads(source.read_text(encoding="utf-8"))
          settings["feed_url"] = feed_url
          target.write_text(
              json.dumps(settings, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          print(f"Runtime settings written to {target}")
          PY

      - name: Generate feed
        if: steps.prague_time.outputs.should_run == 'true'
        id: generate_feed
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m src.core.pipeline --settings config/settings.runtime.json

      - name: Upload feed artifacts
        if: steps.prague_time.outputs.should_run == 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: shopping-feed-output
          if-no-files-found: error
          path: |
            data/cache.json
            data/output/*.xml
            data/output/*.csv
            data/output/*.json

      - name: Save AI cache
        if: steps.prague_time.outputs.should_run == 'true' && hashFiles('data/cache.json') != '' && success()
        uses: actions/cache/save@v4
        with:
          path: data/cache.json
          key: shopping-feed-ai-cache-${{ github.ref_name }}-${{ github.run_id }}

      - name: Configure GitHub Pages
        if: steps.prague_time.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Prepare Pages content
        if: steps.prague_time.outputs.should_run == 'true'
        run: |
          mkdir -p site
          cp data/output/optimized_feed.xml site/feed.xml
          cp data/output/optimized_feed.xml site/optimized_feed.xml

          if compgen -G "data/output/*.csv" > /dev/null; then
            cp data/output/*.csv site/
          fi

          if compgen -G "data/output/*.json" > /dev/null; then
            cp data/output/*.json site/
          fi

          touch site/.nojekyll

      - name: Upload Pages artifact
        if: steps.prague_time.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.prague_time.outputs.should_run == 'true'
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Send e-mail report
        if: always() && steps.prague_time.outputs.should_run == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
          REPORT_EMAIL_TO: lholer@seznam.cz
          RUN_REPORT_PATH: data/output/feed_run_report.json
          QA_REPORT_PATH: data/output/feed_qa_report.json
          WORKFLOW_STATUS: ${{ job.status }}
        run: |
          python scripts/send_workflow_email.py
