name: Generate Feed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    # Two UTC schedules cover both CET and CEST; a Prague-time gate below allows only 05:30 local time.
    - cron: "30 3 * * *"
    - cron: "30 4 * * *"

jobs:
  build-feed:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      CACHE_KEY_PREFIX: shopping-feed-ai-cache-${{ github.ref_name }}-
      MAX_AI_PRODUCTS: ${{ vars.MAX_AI_PRODUCTS }}
      AI_SAFETY_MAX_SELECTED: ${{ vars.AI_SAFETY_MAX_SELECTED }}
      AI_ENFORCE_SAFETY: ${{ vars.AI_ENFORCE_SAFETY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Prague runtime window
        id: prague_time
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_time=$(TZ=Europe/Prague date +%H:%M)
          echo "Current Europe/Prague time: $current_time"

          if [ "$current_time" = "05:30" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled run outside 05:30 Europe/Prague."
          fi

      - name: Set up Python
        if: steps.prague_time.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Inspect cache before restore
        if: steps.prague_time.outputs.should_run == 'true'
        shell: bash
        run: |
          mkdir -p data
          if [ -f data/cache.json ]; then
            echo "Cache exists before restore: true"
            wc -c data/cache.json
          else
            echo "Cache exists before restore: false"
          fi
          echo "Cache key prefix: ${CACHE_KEY_PREFIX}"

      - name: Restore AI cache
        if: steps.prague_time.outputs.should_run == 'true'
        id: ai_cache_restore
        uses: actions/cache/restore@v4
        with:
          path: data/cache.json
          key: ${{ env.CACHE_KEY_PREFIX }}${{ github.run_id }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}

      - name: Inspect cache after restore
        if: steps.prague_time.outputs.should_run == 'true'
        id: cache_restore_state
        shell: bash
        run: |
          echo "cache_hit_output=${{ steps.ai_cache_restore.outputs.cache-hit }}"
          echo "cache_primary_key=${{ steps.ai_cache_restore.outputs.cache-primary-key }}"
          echo "cache_matched_key=${{ steps.ai_cache_restore.outputs.cache-matched-key }}"
          if [ -f data/cache.json ]; then
            echo "cache_restored=true" >> "$GITHUB_OUTPUT"
            echo "cache_bytes=$(wc -c < data/cache.json)" >> "$GITHUB_OUTPUT"
            echo "Cache exists after restore: true"
            wc -c data/cache.json
          else
            echo "cache_restored=false" >> "$GITHUB_OUTPUT"
            echo "cache_bytes=0" >> "$GITHUB_OUTPUT"
            echo "Cache exists after restore: false"
          fi

      - name: Install dependencies
        if: steps.prague_time.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare runtime settings
        if: steps.prague_time.outputs.should_run == 'true'
        env:
          FEED_URL: ${{ secrets.FEED_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          feed_url = os.environ.get("FEED_URL", "").strip()
          if not feed_url:
              raise SystemExit("Missing GitHub secret FEED_URL.")

          source = Path("config/settings.example.json")
          target = Path("config/settings.runtime.json")
          settings = json.loads(source.read_text(encoding="utf-8"))
          settings["feed_url"] = feed_url
          target.write_text(
              json.dumps(settings, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          print(f"Runtime settings written to {target}")
          PY

      - name: Preflight AI selection
        if: steps.prague_time.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ""
        run: |
          python -m src.core.pipeline --settings config/settings.runtime.json --dry-run

      - name: Enforce AI safety
        if: steps.prague_time.outputs.should_run == 'true'
        id: ai_safety
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("data/output/feed_run_report.json")
          if not report_path.exists():
              raise SystemExit("AI safety preflight failed: feed_run_report.json was not generated.")

          report = json.loads(report_path.read_text(encoding="utf-8"))
          cache_restored = "${{ steps.cache_restore_state.outputs.cache_restored }}" == "true"
          has_api_key = bool(os.getenv("OPENAI_API_KEY", "").strip())
          explicit_max = bool(os.getenv("MAX_AI_PRODUCTS", "").strip())
          safety_threshold = int(os.getenv("AI_SAFETY_MAX_SELECTED", "100") or "100")
          enforce_raw = os.getenv("AI_ENFORCE_SAFETY", "").strip().lower()
          enforce_safety = enforce_raw != "false"
          ai_selected = int(report.get("ai_selected_count", 0) or 0)
          cache_misses = int(report.get("cache_misses", 0) or 0)

          outputs = {
              "ai_allowed": "true",
              "ai_safety_stop": "false",
              "ai_safety_reason": "allowed",
              "ai_safety_enforced": str(enforce_safety).lower(),
          }

          if not has_api_key:
              outputs["ai_safety_reason"] = "no_api_key"
          elif not cache_restored:
              outputs["ai_allowed"] = "false"
              outputs["ai_safety_stop"] = "true"
              outputs["ai_safety_reason"] = "cache_not_restored"
          elif not explicit_max and (ai_selected > safety_threshold or cache_misses > safety_threshold):
              outputs["ai_allowed"] = "false"
              outputs["ai_safety_stop"] = "true"
              outputs["ai_safety_reason"] = "preflight_threshold_exceeded"

          if outputs["ai_allowed"] != "true" and not enforce_safety:
              outputs["ai_allowed"] = "true"
              outputs["ai_safety_stop"] = "false"
              outputs["ai_safety_reason"] = f"{outputs['ai_safety_reason']}_bypass"

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              for key, value in outputs.items():
                  handle.write(f"{key}={value}\n")

          print(json.dumps({
              "cache_restored": cache_restored,
              "has_api_key": has_api_key,
              "explicit_max_ai_products": explicit_max,
              "ai_selected_count": ai_selected,
              "cache_misses": cache_misses,
              "safety_threshold": safety_threshold,
              "enforce_safety": enforce_safety,
              "decision": outputs,
          }, ensure_ascii=False))

          if outputs["ai_allowed"] != "true" and has_api_key and enforce_safety:
              raise SystemExit(
                  f"AI safety stop activated: {outputs['ai_safety_reason']}. "
                  f"cache_restored={cache_restored}, ai_selected_count={ai_selected}, "
                  f"cache_misses={cache_misses}, explicit_max_ai_products={explicit_max}."
              )
          PY

      - name: Generate feed
        if: steps.prague_time.outputs.should_run == 'true' && steps.ai_safety.outputs.ai_allowed == 'true'
        id: generate_feed
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m src.core.pipeline --settings config/settings.runtime.json

      - name: Save AI cache
        if: steps.prague_time.outputs.should_run == 'true' && hashFiles('data/cache.json') != '' && success()
        id: ai_cache_save
        uses: actions/cache/save@v4
        with:
          path: data/cache.json
          key: ${{ env.CACHE_KEY_PREFIX }}${{ github.run_id }}

      - name: Inspect cache after save
        if: steps.prague_time.outputs.should_run == 'true' && success()
        id: cache_save_state
        shell: bash
        run: |
          if [ -f data/cache.json ]; then
            echo "cache_saved=true" >> "$GITHUB_OUTPUT"
            echo "cache_bytes=$(wc -c < data/cache.json)" >> "$GITHUB_OUTPUT"
            echo "Cache exists after save: true"
            wc -c data/cache.json
          else
            echo "cache_saved=false" >> "$GITHUB_OUTPUT"
            echo "cache_bytes=0" >> "$GITHUB_OUTPUT"
            echo "Cache exists after save: false"
          fi

      - name: Enrich run report with workflow cache metadata
        if: steps.prague_time.outputs.should_run == 'true' && success()
        shell: bash
        env:
          CACHE_RESTORED: ${{ steps.cache_restore_state.outputs.cache_restored }}
          CACHE_RESTORED_BYTES: ${{ steps.cache_restore_state.outputs.cache_bytes }}
          CACHE_SAVED: ${{ steps.cache_save_state.outputs.cache_saved }}
          CACHE_SAVED_BYTES: ${{ steps.cache_save_state.outputs.cache_bytes }}
          CACHE_KEY: ${{ env.CACHE_KEY_PREFIX }}${{ github.run_id }}
          AI_SAFETY_STOP: ${{ steps.ai_safety.outputs.ai_safety_stop }}
          AI_SAFETY_REASON: ${{ steps.ai_safety.outputs.ai_safety_reason }}
          AI_SAFETY_ENFORCED: ${{ steps.ai_safety.outputs.ai_safety_enforced }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("data/output/feed_run_report.json")
          if not path.exists():
              raise SystemExit("feed_run_report.json not found")

          payload = json.loads(path.read_text(encoding="utf-8"))
          payload["cache_restored"] = os.getenv("CACHE_RESTORED") == "true"
          payload["cache_restored_bytes"] = int(os.getenv("CACHE_RESTORED_BYTES", "0") or "0")
          payload["cache_saved"] = os.getenv("CACHE_SAVED") == "true"
          payload["cache_saved_bytes"] = int(os.getenv("CACHE_SAVED_BYTES", "0") or "0")
          payload["cache_key"] = os.getenv("CACHE_KEY", "")
          payload["ai_safety_stop"] = os.getenv("AI_SAFETY_STOP") == "true"
          payload["ai_safety_reason"] = os.getenv("AI_SAFETY_REASON", "")
          payload["ai_safety_enforced"] = os.getenv("AI_SAFETY_ENFORCED") == "true"
          path.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps({
              "cache_restored": payload["cache_restored"],
              "cache_saved": payload["cache_saved"],
              "cache_key": payload["cache_key"],
              "cache_restored_bytes": payload["cache_restored_bytes"],
              "cache_saved_bytes": payload["cache_saved_bytes"],
              "ai_safety_stop": payload["ai_safety_stop"],
              "ai_safety_reason": payload["ai_safety_reason"],
              "ai_safety_enforced": payload["ai_safety_enforced"],
          }, ensure_ascii=False))
          PY

      - name: Upload feed artifacts
        if: steps.prague_time.outputs.should_run == 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: shopping-feed-output
          if-no-files-found: error
          path: |
            data/cache.json
            data/output/*.xml
            data/output/*.csv
            data/output/*.json

      - name: Configure GitHub Pages
        if: steps.prague_time.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Prepare Pages content
        if: steps.prague_time.outputs.should_run == 'true'
        run: |
          mkdir -p site
          cp data/output/optimized_feed.xml site/feed.xml
          cp data/output/optimized_feed.xml site/optimized_feed.xml

          if compgen -G "data/output/*.csv" > /dev/null; then
            cp data/output/*.csv site/
          fi

          if compgen -G "data/output/*.json" > /dev/null; then
            cp data/output/*.json site/
          fi

          touch site/.nojekyll

      - name: Upload Pages artifact
        if: steps.prague_time.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.prague_time.outputs.should_run == 'true'
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Send e-mail report
        if: always() && steps.prague_time.outputs.should_run == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
          REPORT_EMAIL_TO: lholer@seznam.cz
          RUN_REPORT_PATH: data/output/feed_run_report.json
          QA_REPORT_PATH: data/output/feed_qa_report.json
          WORKFLOW_STATUS: ${{ job.status }}
        run: |
          python scripts/send_workflow_email.py
